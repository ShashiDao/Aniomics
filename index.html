<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Aniomics | Grand Library</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'], serif: ['Cinzel', 'serif'] }
        }
      }
    }
  </script>

  <style>
    body { 
      margin: 0; background: #050505; color: white; overflow: hidden; 
      -webkit-font-smoothing: antialiased; font-family: 'Inter', sans-serif;
    }
    .serif { font-family: 'Cinzel', serif; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    
    /* The "Atmosphere" Glow */
    #root::before {
      content: ""; position: fixed; top: -10%; right: -10%; 
      width: 50%; height: 50%; border-radius: 50%;
      background: radial-gradient(circle, rgba(180, 83, 9, 0.05) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/main.jsx"></script>
</body>
</html>
